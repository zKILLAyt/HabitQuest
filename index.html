<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>HabitQuest</title>
  </head>
  <body>
    <header class="header">
      <div>
        <h1>HabitQuest</h1>
        <p>Transforme seus hábitos em conquistas</p>
      </div>

      <div class="profile-card">
        <span>Nível <strong id="level">1</strong></span>
        <span>XP <strong id="xp">0/100</strong></span>
      </div>
    </header>

    <main class="container">
      <section class="dashboard">
        <div class="progress-box">
          <div class="progress-info">
            <span>Progresso para o próximo nível</span>
            <strong id="progressText">0%</strong>
          </div>

          <div class="progress-bar">
            <div id="progressFill"></div>
          </div>
        </div>

        <div class="stats">
          <div>
            <strong id="totalHabits">0</strong>
            <span>Hábitos</span>
          </div>

          <div>
            <strong id="completedHabits">0</strong>
            <span>Concluídos</span>
          </div>

          <div>
            <strong id="streak">0</strong>
            <span>🔥 Streak</span>
          </div>
        </div>
      </section>

      <section class="form-section">
        <h2>Criar novo hábito</h2>

        <form id="habitForm">
          <input
            type="text"
            id="habitName"
            placeholder="Nome do hábito"
            required
          />

          <textarea
            id="habitDescription"
            placeholder="Descrição do hábito"
          ></textarea>

          <select id="habitCategory" required>
            <option value="">Escolha uma categoria</option>
            <option value="💪 Saúde">💪 Saúde</option>
            <option value="📚 Estudos">📚 Estudos</option>
            <option value="💻 Programação">💻 Programação</option>
            <option value="🏃 Exercícios">🏃 Exercícios</option>
            <option value="🎯 Pessoal">🎯 Pessoal</option>
          </select>

          <button type="submit">Adicionar Hábito</button>
        </form>
      </section>

      <section class="habits-section">
        <h2>Meus hábitos</h2>

        <div id="habitsList" class="habits-list"></div>
      </section>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/habits.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
